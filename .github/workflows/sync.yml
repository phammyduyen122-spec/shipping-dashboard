name: Sync Google Drive Data

on:
  schedule:
    # Runs daily at 16:30 UTC (23:30 ICT / Vietnam Time)
    - cron: '30 16 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Sync data from Google Drive
      run: |
        python download_drive_folder.py

    - name: Parse spreadsheets and update data.js
      run: |
        python parse_excel.py

    - name: Commit and push if data.js changed
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data.js
        # Check if there are any changes staged for commit
        git diff --quiet && git diff --staged --quiet || (git commit -m 'Auto-update data.js from Google Drive' && git push)
